apiVersion: bpfman.io/v1alpha1
kind: Config
metadata:
  name: bpfman-config
spec:
  agent:
    healthProbePort: 8175
    image: quay.io/bpfman/bpfman-agent:latest
    logLevel: info
  configuration: |
    [database]
    max_retries = 30
    millisec_delay = 10000
    [signing]
    allow_unsigned = true
    verify_enabled = true
  daemon:
    image: quay.io/bpfman/bpfman:latest
    logLevel: info
    # nodeSelector, tolerations and affinity control where the bpfman
    # daemon and metrics-proxy DaemonSet pods are scheduled. When set,
    # each field replaces the value baked into the static manifests.
    #
    # nodeSelector:
    #   kubernetes.io/os: linux
    # tolerations:
    #   - operator: Exists
    # affinity:
    #   nodeAffinity:
    #     requiredDuringSchedulingIgnoredDuringExecution:
    #       nodeSelectorTerms:
    #         - matchExpressions:
    #             - key: kubernetes.io/os
    #               operator: In
    #               values: [linux]
  namespace: bpfman
