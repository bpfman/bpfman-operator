---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.15.0
  name: bpfapplicationstates.bpfman.io
spec:
  group: bpfman.io
  names:
    kind: BpfApplicationState
    listKind: BpfApplicationStateList
    plural: bpfapplicationstates
    singular: bpfapplicationstate
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.node
      name: Node
      type: string
    - jsonPath: .status.conditions[0].reason
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BpfApplicationState contains the per-node state of a BpfApplication.
          ANF-TODO: I can't get the Node to display in the kubectl output.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BpfApplicationSpec defines the desired state of BpfApplication
            properties:
              apploadstatus:
                description: |-
                  AppLoadStatus reflects the status of loading the bpf application on the
                  given node.
                type: string
              node:
                description: Node is the name of the node for this BpfApplicationStateSpec.
                type: string
              programs:
                description: |-
                  Programs is a list of bpf programs contained in the parent application.
                  It is a map from the bpf program name to BpfApplicationProgramState
                  elements.
                items:
                  description: |-
                    BpfApplicationProgramState defines the desired state of BpfApplication
                    // +kubebuilder:validation:XValidation:rule="has(self.type) && self.type == 'TC' ?  has(self.tc) : !has(self.tc)",message="tc configuration is required when type is TC, and forbidden otherwise"
                    // +kubebuilder:validation:XValidation:rule="has(self.type) && self.type == 'Fexit' ?  has(self.fexit) : !has(self.fexit)",message="fexit configuration is required when type is Fexit, and forbidden otherwise"
                    // +kubebuilder:validation:XValidation:rule="has(self.type) && self.type == 'Kprobe' ?  has(self.kprobe) : !has(self.kprobe)",message="kprobe configuration is required when type is Kprobe, and forbidden otherwise"
                    // +kubebuilder:validation:XValidation:rule="has(self.type) && self.type == 'Kretprobe' ?  has(self.kretprobe) : !has(self.kretprobe)",message="kretprobe configuration is required when type is Kretprobe, and forbidden otherwise"
                    // +kubebuilder:validation:XValidation:rule="has(self.type) && self.type == 'Uprobe' ?  has(self.uprobe) : !has(self.uprobe)",message="uprobe configuration is required when type is Uprobe, and forbidden otherwise"
                    // +kubebuilder:validation:XValidation:rule="has(self.type) && self.type == 'Uretprobe' ?  has(self.uretprobe) : !has(self.uretprobe)",message="uretprobe configuration is required when type is Uretprobe, and forbidden otherwise"
                    // +kubebuilder:validation:XValidation:rule="has(self.type) && self.type == 'Tracepoint' ?  has(self.tracepoint) : !has(self.tracepoint)",message="tracepoint configuration is required when type is Tracepoint, and forbidden otherwise"
                  properties:
                    bpffunctionname:
                      description: |-
                        BpfFunctionName is the name of the function that is the entry point for the BPF
                        program
                      type: string
                    fentry:
                      description: fentry defines the desired state of the application's
                        FentryPrograms.
                      properties:
                        attach:
                          type: boolean
                        attachid:
                          description: |-
                            An identifier for the attach point assigned by bpfman. This field is
                            empty until the program is successfully attached and bpfman returns the
                            id.
                            ANF-TODO: For the POC, this will be the program ID.
                          format: int32
                          type: integer
                        attachstatus:
                          description: |-
                            AttachStatus reflects whether the attachment has been reconciled
                            successfully, and if not, why.
                          type: string
                        function_name:
                          description: FunctionName is the name of the function to
                            attach the Fentry program to.
                          type: string
                        should_attach:
                          description: ShouldAttach reflects whether the attachment
                            should exist.
                          type: boolean
                        uuid:
                          description: |-
                            ANF-TODO: Putting a uuid here for now to maintain compatibility with the
                            existing BpfProgram.
                          type: string
                      required:
                      - attach
                      - attachid
                      - attachstatus
                      - function_name
                      - should_attach
                      - uuid
                      type: object
                    oldmapownerselector:
                      description: |-
                        ANF-TODO: MapOwnerSelector has been moved to BpfAppCommon. Do not use in
                        new load/attach split code.


                        OldMapOwnerSelector is used to select the loaded eBPF program this eBPF
                        program will share a map with. The value is a label applied to the
                        BpfProgram to select. The selector must resolve to exactly one instance
                        of a BpfProgram on a given node or the eBPF program will not load.
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector
                            requirements. The requirements are ANDed.
                          items:
                            description: |-
                              A label selector requirement is a selector that contains values, a key, and an operator that
                              relates the key and values.
                            properties:
                              key:
                                description: key is the label key that the selector
                                  applies to.
                                type: string
                              operator:
                                description: |-
                                  operator represents a key's relationship to a set of values.
                                  Valid operators are In, NotIn, Exists and DoesNotExist.
                                type: string
                              values:
                                description: |-
                                  values is an array of string values. If the operator is In or NotIn,
                                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            required:
                            - key
                            - operator
                            type: object
                          type: array
                          x-kubernetes-list-type: atomic
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: |-
                            matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                            map is equivalent to an element of matchExpressions, whose key field is "key", the
                            operator is "In", and the values array contains only "value". The requirements are ANDed.
                          type: object
                      type: object
                      x-kubernetes-map-type: atomic
                    program_id:
                      description: |-
                        ProgramId is the id of the program in the kernel.  Not set until the
                        program is loaded.
                      format: int32
                      type: integer
                    programattachstatus:
                      description: |-
                        ProgramAttachStatus records whether the program should be loaded and whether
                        the program is loaded.
                      type: string
                    tc:
                      description: tc defines the desired state of the application's
                        TcPrograms.
                      properties:
                        attach_points:
                          description: |-
                            The list of points to which the program should be attached.
                            TcAttachInfoState is similar to TcAttachInfo, but the interface and
                            container selectors are expanded, and we have one instance of
                            TcAttachInfoState for each unique attach point. The list is optional and
                            may be udated after the bpf program has been loaded.
                          items:
                            properties:
                              attachid:
                                description: |-
                                  An identifier for the attach point assigned by bpfman. This field is
                                  empty until the program is successfully attached and bpfman returns the
                                  id.
                                  ANF-TODO: For the POC, this will be the program ID.
                                format: int32
                                type: integer
                              attachstatus:
                                description: |-
                                  AttachStatus reflects whether the attachment has been reconciled
                                  successfully, and if not, why.
                                type: string
                              containerpid:
                                description: Optional container pid to attach the
                                  tc program in.
                                format: int32
                                type: integer
                              direction:
                                description: |-
                                  Direction specifies the direction of traffic the tc program should
                                  attach to for a given network device.
                                enum:
                                - ingress
                                - egress
                                type: string
                              ifname:
                                description: Interface name to attach the tc program
                                  to.
                                type: string
                              priority:
                                description: |-
                                  Priority specifies the priority of the tc program in relation to
                                  other programs of the same type with the same attach point. It is a value
                                  from 0 to 1000 where lower values have higher precedence.
                                format: int32
                                maximum: 1000
                                minimum: 0
                                type: integer
                              proceedon:
                                description: |-
                                  ProceedOn allows the user to call other tc programs in chain on this exit code.
                                  Multiple values are supported by repeating the parameter.
                                items:
                                  enum:
                                  - unspec
                                  - ok
                                  - reclassify
                                  - shot
                                  - pipe
                                  - stolen
                                  - queued
                                  - repeat
                                  - redirect
                                  - trap
                                  - dispatcher_return
                                  type: string
                                maxItems: 11
                                type: array
                              should_attach:
                                description: ShouldAttach reflects whether the attachment
                                  should exist.
                                type: boolean
                              uuid:
                                description: |-
                                  ANF-TODO: Putting a uuid here for now to maintain compatibility with the
                                  existing BpfProgram.
                                type: string
                            required:
                            - attachid
                            - attachstatus
                            - direction
                            - ifname
                            - priority
                            - proceedon
                            - should_attach
                            - uuid
                            type: object
                          type: array
                      type: object
                    tcx:
                      description: tcx defines the desired state of the application's
                        TcxPrograms.
                      properties:
                        attach_points:
                          description: |-
                            The list of points to which the program should be attached.
                            TcxAttachInfoState is similar to TcxAttachInfo, but the interface and
                            container selectors are expanded, and we have one instance of
                            TcxAttachInfoState for each unique attach point. The list is optional and
                            may be udated after the bpf program has been loaded.
                          items:
                            properties:
                              attachid:
                                description: |-
                                  An identifier for the attach point assigned by bpfman. This field is
                                  empty until the program is successfully attached and bpfman returns the
                                  id.
                                  ANF-TODO: For the POC, this will be the program ID.
                                format: int32
                                type: integer
                              attachstatus:
                                description: |-
                                  AttachStatus reflects whether the attachment has been reconciled
                                  successfully, and if not, why.
                                type: string
                              containerpid:
                                description: Optional container pid to attach the
                                  tcx program in.
                                format: int32
                                type: integer
                              direction:
                                description: |-
                                  Direction specifies the direction of traffic the tcx program should
                                  attach to for a given network device.
                                enum:
                                - ingress
                                - egress
                                type: string
                              ifname:
                                description: Interface name to attach the tcx program
                                  to.
                                type: string
                              priority:
                                description: |-
                                  Priority specifies the priority of the tcx program in relation to
                                  other programs of the same type with the same attach point. It is a value
                                  from 0 to 1000 where lower values have higher precedence.
                                format: int32
                                maximum: 1000
                                minimum: 0
                                type: integer
                              should_attach:
                                description: ShouldAttach reflects whether the attachment
                                  should exist.
                                type: boolean
                              uuid:
                                description: |-
                                  ANF-TODO: Putting a uuid here for now to maintain compatibility with the
                                  existing BpfProgram.
                                type: string
                            required:
                            - attachid
                            - attachstatus
                            - direction
                            - ifname
                            - priority
                            - should_attach
                            - uuid
                            type: object
                          type: array
                      type: object
                    type:
                      description: Type specifies the bpf program type
                      enum:
                      - XDP
                      - TC
                      - TCX
                      - Fentry
                      - Fexit
                      - Kprobe
                      - Kretprobe
                      - Uprobe
                      - Uretprobe
                      - Tracepoint
                      type: string
                    xdp:
                      description: xdp defines the desired state of the application's
                        XdpPrograms.
                      properties:
                        attach_points:
                          description: |-
                            The list of points to which the program should be attached.
                            XdpAttachInfoState is similar to XdpAttachInfo, but the interface and
                            container selectors are expanded, and we have one instance of
                            XdpAttachInfoState for each unique attach point. The list is optional and
                            may be udated after the bpf program has been loaded.
                          items:
                            properties:
                              attachid:
                                description: |-
                                  An identifier for the attach point assigned by bpfman. This field is
                                  empty until the program is successfully attached and bpfman returns the
                                  id.
                                  ANF-TODO: For the POC, this will be the program ID.
                                format: int32
                                type: integer
                              attachstatus:
                                description: |-
                                  AttachStatus reflects whether the attachment has been reconciled
                                  successfully, and if not, why.
                                type: string
                              containerpid:
                                description: Optional container pid to attach the
                                  xdp program in.
                                format: int32
                                type: integer
                              ifname:
                                description: Interface name to attach the xdp program
                                  to.
                                type: string
                              priority:
                                description: |-
                                  Priority specifies the priority of the xdp program in relation to
                                  other programs of the same type with the same attach point. It is a value
                                  from 0 to 1000 where lower values have higher precedence.
                                format: int32
                                maximum: 1000
                                minimum: 0
                                type: integer
                              proceedon:
                                description: |-
                                  ProceedOn allows the user to call other xdp programs in chain on this exit code.
                                  Multiple values are supported by repeating the parameter.
                                items:
                                  enum:
                                  - aborted
                                  - drop
                                  - pass
                                  - tx
                                  - redirect
                                  - dispatcher_return
                                  type: string
                                maxItems: 6
                                type: array
                              should_attach:
                                description: ShouldAttach reflects whether the attachment
                                  should exist.
                                type: boolean
                              uuid:
                                description: |-
                                  ANF-TODO: Putting a uuid here for now to maintain compatibility with the
                                  existing BpfProgram.
                                type: string
                            required:
                            - attachid
                            - attachstatus
                            - ifname
                            - priority
                            - proceedon
                            - should_attach
                            - uuid
                            type: object
                          type: array
                      type: object
                  required:
                  - bpffunctionname
                  - programattachstatus
                  type: object
                  x-kubernetes-validations:
                  - message: xdp configuration is required when type is XDP, and forbidden
                      otherwise
                    rule: 'has(self.type) && self.type == ''XDP'' ?  has(self.xdp)
                      : !has(self.xdp)'
                  - message: tcx configuration is required when type is TCX, and forbidden
                      otherwise
                    rule: 'has(self.type) && self.type == ''TCX'' ?  has(self.tcx)
                      : !has(self.tcx)'
                  - message: fentry configuration is required when type is Fentry,
                      and forbidden otherwise
                    rule: 'has(self.type) && self.type == ''Fentry'' ?  has(self.fentry)
                      : !has(self.fentry)'
                type: array
              updatecount:
                description: |-
                  The number of times the BpfApplicationState has been updated.  Set to 1
                  when the object is created, then it is incremented prior to each update.
                  This allows us to verify that the API server has the updated object prior
                  to starting a new Reconcile operation.
                format: int64
                type: integer
            required:
            - apploadstatus
            - node
            - updatecount
            type: object
          status:
            description: BpfAppStatus reflects the status of a BpfApplication or BpfApplicationState
              object
            properties:
              conditions:
                description: |-
                  For a BpfApplication object, Conditions contains the global cluster state
                  for the object. For a BpfApplicationState object, Conditions contains the
                  state of the BpfApplication object on the given node.
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
